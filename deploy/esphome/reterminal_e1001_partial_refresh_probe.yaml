globals:
  - id: last_payload_body
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: staged_payload_body
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: last_error_text
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: pending_display_refresh
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: force_full_refresh_requested
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: partial_refresh_counter
    type: int
    restore_value: no
    initial_value: '0'
  - id: claude_value_live
    type: std::string
    restore_value: no
    initial_value: '"--"'
  - id: claude_cost_live
    type: std::string
    restore_value: no
    initial_value: '"--"'
  - id: claude_requests_live
    type: int
    restore_value: no
    initial_value: '0'
  - id: claude_enabled_live
    type: int
    restore_value: no
    initial_value: '0'
  - id: sub2api_value_live
    type: std::string
    restore_value: no
    initial_value: '"--"'
  - id: sub2api_cost_live
    type: std::string
    restore_value: no
    initial_value: '"--"'
  - id: sub2api_requests_live
    type: int
    restore_value: no
    initial_value: '0'
  - id: sub2api_enabled_live
    type: int
    restore_value: no
    initial_value: '0'
  - id: total_value_live
    type: std::string
    restore_value: no
    initial_value: '"--"'
  - id: total_cost_live
    type: std::string
    restore_value: no
    initial_value: '"--"'
  - id: total_requests_live
    type: int
    restore_value: no
    initial_value: '0'
  - id: total_alerts_live
    type: int
    restore_value: no
    initial_value: '0'

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO9

script:
  - id: fetch_dashboard_payload
    mode: restart
    then:
      - http_request.get:
          url: !secret infohub_eink_device_url
          capture_response: true
          max_response_buffer_size: 16384
          on_response:
            then:
              - lambda: |-
                  const int full_payload_sync_every = ${full_payload_sync_every};
                  bool should_refresh = false;
                  if (response->status_code != 200) {
                    std::string next_error = "HTTP " + std::to_string(response->status_code);
                    bool has_cached_payload = !id(last_payload_body).empty();
                    if (id(last_error_text) != next_error) {
                      id(last_error_text) = next_error;
                      // Keep the previous E-Ink frame when the device reboots
                      // but the first refetch still has not succeeded yet.
                      should_refresh = has_cached_payload;
                    }
                    id(pending_display_refresh) = should_refresh;
                    return;
                  }

                  std::string next_claude_value = "--";
                  std::string next_claude_cost = "--";
                  int next_claude_requests = 0;
                  int next_claude_enabled = 0;

                  std::string next_sub2api_value = "--";
                  std::string next_sub2api_cost = "--";
                  int next_sub2api_requests = 0;
                  int next_sub2api_enabled = 0;

                  std::string next_total_value = "--";
                  std::string next_total_cost = "--";
                  int next_total_requests = 0;
                  int next_total_alerts = 0;

                  bool parsed = json::parse_json(body, [&](JsonObject root) -> bool {
                    JsonObject claude_obj = root["claude"];
                    const char *claude_value = claude_obj["value"] | "--";
                    const char *claude_cost = claude_obj["cost"] | "--";
                    next_claude_value = claude_value != nullptr ? claude_value : "--";
                    next_claude_cost = claude_cost != nullptr ? claude_cost : "--";
                    next_claude_requests = claude_obj["requests"] | 0;
                    next_claude_enabled = claude_obj["enabled"] | 0;

                    JsonObject sub2api_obj = root["sub2api"];
                    const char *sub2api_value = sub2api_obj["value"] | "--";
                    const char *sub2api_cost = sub2api_obj["cost"] | "--";
                    next_sub2api_value = sub2api_value != nullptr ? sub2api_value : "--";
                    next_sub2api_cost = sub2api_cost != nullptr ? sub2api_cost : "--";
                    next_sub2api_requests = sub2api_obj["requests"] | 0;
                    next_sub2api_enabled = sub2api_obj["enabled"] | 0;

                    JsonObject total_obj = root["total"];
                    const char *total_value = total_obj["value"] | "--";
                    const char *total_cost = total_obj["cost"] | "--";
                    next_total_value = total_value != nullptr ? total_value : "--";
                    next_total_cost = total_cost != nullptr ? total_cost : "--";
                    next_total_requests = total_obj["requests"] | 0;
                    next_total_alerts = total_obj["alerts"] | 0;
                    return true;
                  });

                  if (!parsed) {
                    std::string next_error = "parse error";
                    bool has_cached_payload = !id(last_payload_body).empty();
                    if (id(last_error_text) != next_error) {
                      id(last_error_text) = next_error;
                      should_refresh = has_cached_payload;
                    }
                    id(pending_display_refresh) = should_refresh;
                    return;
                  }

                  bool metrics_changed = false;

                  if (id(claude_value_live) != next_claude_value) {
                    id(claude_value_live) = next_claude_value;
                    metrics_changed = true;
                  }
                  if (id(claude_cost_live) != next_claude_cost) {
                    id(claude_cost_live) = next_claude_cost;
                    metrics_changed = true;
                  }
                  if (id(claude_requests_live) != next_claude_requests) {
                    id(claude_requests_live) = next_claude_requests;
                    metrics_changed = true;
                  }
                  if (id(claude_enabled_live) != next_claude_enabled) {
                    id(claude_enabled_live) = next_claude_enabled;
                    metrics_changed = true;
                  }

                  if (id(sub2api_value_live) != next_sub2api_value) {
                    id(sub2api_value_live) = next_sub2api_value;
                    metrics_changed = true;
                  }
                  if (id(sub2api_cost_live) != next_sub2api_cost) {
                    id(sub2api_cost_live) = next_sub2api_cost;
                    metrics_changed = true;
                  }
                  if (id(sub2api_requests_live) != next_sub2api_requests) {
                    id(sub2api_requests_live) = next_sub2api_requests;
                    metrics_changed = true;
                  }
                  if (id(sub2api_enabled_live) != next_sub2api_enabled) {
                    id(sub2api_enabled_live) = next_sub2api_enabled;
                    metrics_changed = true;
                  }

                  if (id(total_value_live) != next_total_value) {
                    id(total_value_live) = next_total_value;
                    metrics_changed = true;
                  }
                  if (id(total_cost_live) != next_total_cost) {
                    id(total_cost_live) = next_total_cost;
                    metrics_changed = true;
                  }
                  if (id(total_requests_live) != next_total_requests) {
                    id(total_requests_live) = next_total_requests;
                    metrics_changed = true;
                  }
                  if (id(total_alerts_live) != next_total_alerts) {
                    id(total_alerts_live) = next_total_alerts;
                    metrics_changed = true;
                  }

                  bool needs_full_payload_sync = id(force_full_refresh_requested) || id(last_payload_body).empty();
                  bool body_changed = id(last_payload_body) != body;

                  if (body_changed && !needs_full_payload_sync) {
                    id(staged_payload_body) = body;
                  }

                  if (metrics_changed) {
                    should_refresh = true;
                    id(partial_refresh_counter) += 1;
                  }

                  if (id(partial_refresh_counter) >= full_payload_sync_every) {
                    needs_full_payload_sync = true;
                  }

                  if (needs_full_payload_sync) {
                    id(last_payload_body) = body;
                    id(staged_payload_body).clear();
                    id(partial_refresh_counter) = 0;
                    should_refresh = true;
                  }

                  if (!id(last_error_text).empty()) {
                    id(last_error_text).clear();
                    should_refresh = true;
                  }

                  id(force_full_refresh_requested) = false;
                  id(pending_display_refresh) = should_refresh;
              - if:
                  condition:
                    lambda: return id(pending_display_refresh);
                  then:
                    - component.update: epaper_display
                    - lambda: id(pending_display_refresh) = false;
          on_error:
            then:
              - lambda: |-
                  std::string next_error = "network error";
                  bool has_cached_payload = !id(last_payload_body).empty();
                  bool should_refresh = has_cached_payload && id(last_error_text) != next_error;
                  id(last_error_text) = next_error;
                  id(pending_display_refresh) = should_refresh;
              - if:
                  condition:
                    lambda: return id(pending_display_refresh);
                  then:
                    - component.update: epaper_display
                    - lambda: id(pending_display_refresh) = false;

interval:
  - interval: ${poll_interval}
    then:
      - script.execute: fetch_dashboard_payload

button:
  - platform: template
    name: "${friendly_name} Force Sync"
    on_press:
      - lambda: id(force_full_refresh_requested) = true;
      - script.execute: fetch_dashboard_payload

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    name: "${friendly_name} Refresh Button"
    on_press:
      then:
        - lambda: id(force_full_refresh_requested) = true;
        - script.execute: fetch_dashboard_payload

display:
  - platform: waveshare_epaper
    id: epaper_display
    # 当前设备已验证支持 partial refresh，正式面板改走 7.50inV2p。
    # 保留 2ms reset 时序，避免回退到早期白屏初始化问题。
    model: 7.50inV2p
    full_update_every: 15
    cs_pin: GPIO10
    dc_pin: GPIO11
    reset_pin:
      number: GPIO12
      inverted: false
    busy_pin:
      number: GPIO13
      inverted: true
    reset_duration: 2ms
    update_interval: never
    lambda: |-
      it.fill(COLOR_OFF);

      auto trim_text = [&](const std::string &value, size_t max_chars) -> std::string {
        if (max_chars <= 2) {
          return value;
        }

        size_t idx = 0;
        size_t count = 0;
        while (idx < value.size()) {
          unsigned char ch = static_cast<unsigned char>(value[idx]);
          size_t step = 1;
          if ((ch & 0x80) == 0x00) {
            step = 1;
          } else if ((ch & 0xE0) == 0xC0) {
            step = 2;
          } else if ((ch & 0xF0) == 0xE0) {
            step = 3;
          } else if ((ch & 0xF8) == 0xF0) {
            step = 4;
          }

          if (idx + step > value.size()) {
            break;
          }
          if (count == max_chars) {
            return value.substr(0, idx) + "..";
          }
          idx += step;
          count++;
        }
        return value;
      };

      auto parse_number_text = [&](const std::string &value) -> long long {
        long long result = 0;
        for (char ch : value) {
          if (ch >= '0' && ch <= '9') {
            result = result * 10 + (ch - '0');
          }
        }
        return result;
      };

      auto format_percent = [&](int percent) -> std::string {
        if (percent < 0) {
          return "--";
        }
        return std::to_string(percent) + "%";
      };

      auto clamp_percent = [&](int percent) -> int {
        int safe_percent = percent;
        if (safe_percent < 0) {
          safe_percent = 0;
        }
        if (safe_percent > 100) {
          safe_percent = 100;
        }
        return safe_percent;
      };

      struct Rect {
        int x;
        int y;
        int w;
        int h;
      };

      auto right_of = [&](const Rect &rect) -> int {
        return rect.x + rect.w;
      };

      auto bottom_of = [&](const Rect &rect) -> int {
        return rect.y + rect.h;
      };

      auto measure_text = [&](auto *font, const std::string &text, TextAlign align, int &width, int &height) {
        int x1 = 0;
        int y1 = 0;
        it.get_text_bounds(0, 0, text.c_str(), font, align, &x1, &y1, &width, &height);
      };

      auto utf8_length = [&](const std::string &value) -> size_t {
        size_t idx = 0;
        size_t count = 0;
        while (idx < value.size()) {
          unsigned char ch = static_cast<unsigned char>(value[idx]);
          size_t step = 1;
          if ((ch & 0x80) == 0x00) {
            step = 1;
          } else if ((ch & 0xE0) == 0xC0) {
            step = 2;
          } else if ((ch & 0xF0) == 0xE0) {
            step = 3;
          } else if ((ch & 0xF8) == 0xF0) {
            step = 4;
          }

          if (idx + step > value.size()) {
            break;
          }
          idx += step;
          count++;
        }
        return count;
      };

      auto fit_text_width = [&](auto *font, const std::string &value, int max_width) -> std::string {
        if (value.empty()) {
          return value;
        }

        int width = 0;
        int height = 0;
        measure_text(font, value, TextAlign::TOP_LEFT, width, height);
        if (width <= max_width) {
          return value;
        }

        size_t chars = utf8_length(value);
        while (chars > 2) {
          std::string candidate = trim_text(value, chars - 1);
          measure_text(font, candidate, TextAlign::TOP_LEFT, width, height);
          if (width <= max_width) {
            return candidate;
          }
          chars--;
        }

        return trim_text(value, 2);
      };

      auto badge_width = [&](auto *font, const std::string &text, int min_width, int max_width, int padding) -> int {
        int text_width = 0;
        int text_height = 0;
        measure_text(font, text, TextAlign::TOP_LEFT, text_width, text_height);
        int width = text_width + padding * 2;
        if (width < min_width) {
          width = min_width;
        }
        if (width > max_width) {
          width = max_width;
        }
        return width;
      };

      auto draw_filled_round_rect = [&](const Rect &box, int radius, Color color) {
        if (box.w <= 0 || box.h <= 0) {
          return;
        }

        int r = radius;
        if (r < 0) {
          r = 0;
        }
        if (r * 2 > box.w) {
          r = box.w / 2;
        }
        if (r * 2 > box.h) {
          r = box.h / 2;
        }

        if (r <= 0) {
          it.filled_rectangle(box.x, box.y, box.w, box.h, color);
          return;
        }

        int center_w = box.w - r * 2;
        int center_h = box.h - r * 2;
        if (center_w > 0) {
          it.filled_rectangle(box.x + r, box.y, center_w, box.h, color);
        }
        if (center_h > 0) {
          it.filled_rectangle(box.x, box.y + r, box.w, center_h, color);
        }

        it.filled_circle(box.x + r, box.y + r, r, color);
        it.filled_circle(box.x + box.w - r - 1, box.y + r, r, color);
        it.filled_circle(box.x + r, box.y + box.h - r - 1, r, color);
        it.filled_circle(box.x + box.w - r - 1, box.y + box.h - r - 1, r, color);
      };

      auto draw_outline_round_rect = [&](const Rect &box, int radius) {
        if (box.w <= 0 || box.h <= 0) {
          return;
        }

        draw_filled_round_rect(box, radius, COLOR_ON);
        if (box.w <= 2 || box.h <= 2) {
          return;
        }

        Rect inner{box.x + 1, box.y + 1, box.w - 2, box.h - 2};
        int inner_radius = radius > 0 ? radius - 1 : 0;
        draw_filled_round_rect(inner, inner_radius, COLOR_OFF);
      };

      auto draw_badge = [&](const Rect &box, const std::string &text, bool filled) {
        std::string fitted = fit_text_width(id(font_badge), text, box.w - 10);
        int radius = box.h / 2;
        if (filled) {
          draw_filled_round_rect(box, radius, COLOR_ON);
          it.printf(
            box.x + box.w / 2,
            box.y + box.h / 2,
            id(font_badge),
            COLOR_OFF,
            COLOR_ON,
            TextAlign::CENTER,
            "%s",
            fitted.c_str()
          );
          return;
        }

        draw_outline_round_rect(box, radius);
        it.printf(box.x + box.w / 2, box.y + box.h / 2, id(font_badge), TextAlign::CENTER, "%s", fitted.c_str());
      };

      auto draw_progress = [&](const Rect &track, int percent, bool full_when_unknown) {
        draw_outline_round_rect(track, track.h / 2);

        int safe_percent = percent < 0 ? (full_when_unknown ? 100 : 0) : clamp_percent(percent);
        if (safe_percent <= 0) {
          return;
        }

        int inner_w = track.w - 2;
        int inner_h = track.h - 2;
        if (inner_w <= 0 || inner_h <= 0) {
          return;
        }

        int fill_w = (inner_w * safe_percent) / 100;
        int min_fill = inner_h;
        if (fill_w < min_fill) {
          fill_w = min_fill;
        }
        if (fill_w > inner_w) {
          fill_w = inner_w;
        }

        Rect fill{track.x + 1, track.y + 1, fill_w, inner_h};
        draw_filled_round_rect(fill, fill.h / 2, COLOR_ON);
      };

      struct OverviewData {
        std::string title;
        std::string value;
        long long value_numeric;
        std::string cost;
        int requests;
        int enabled;
        int alerts;
      };

      struct RowData {
        std::string account;
        int five_percent;
        int week_percent;
        std::string status;
      };

      OverviewData claude = {"Claude", "--", 0, "--", 0, -1, 0};
      OverviewData sub2api = {"Codex", "--", 0, "--", 0, -1, 0};
      OverviewData total = {"合计", "--", 0, "--", 0, -1, 0};

      RowData claude_rows[2] = {{"--", -1, -1, "--"}, {"--", -1, -1, "--"}};
      RowData sub2api_rows[2] = {{"--", -1, -1, "--"}, {"--", -1, -1, "--"}};
      int claude_row_count = 0;
      int sub2api_row_count = 0;

      std::string alert_lines[3] = {"暂无告警", "", ""};
      int alert_count = 0;

      std::string updated_at = "--";
      std::string reset_claude = "--";
      std::string reset_sub2api = "--";
      int refresh_seconds = 0;

      auto format_token_m = [&](const OverviewData &item) -> std::string {
        long long raw = item.value_numeric;
        if (raw <= 0) {
          raw = parse_number_text(item.value);
        }
        if (raw <= 0) {
          return "--";
        }
        long long tenths = (raw + 50000) / 100000;
        long long whole = tenths / 10;
        long long decimal = tenths % 10;
        return std::to_string(whole) + "." + std::to_string(decimal) + "M";
      };

      auto format_money = [&](const std::string &cost) -> std::string {
        if (cost.empty() || cost == "--") {
          return "--";
        }
        return "$" + cost;
      };

      auto draw_overview_card = [&](const Rect &box, const std::string &title, const OverviewData &item, bool show_alerts) {
        std::string fitted_title = fit_text_width(id(font_label), title, box.w - 24);
        std::string value_m = format_token_m(item);
        std::string money_text = format_money(item.cost);
        int divider_y = box.y + box.h - 31;

        draw_outline_round_rect(box, 0);
        it.printf(box.x + 12, box.y + 11, id(font_label), "%s", fitted_title.c_str());

        Rect value_clip{box.x + 12, box.y + 31, box.w - 24, divider_y - box.y - 34};
        it.start_clipping(value_clip.x, value_clip.y, value_clip.x + value_clip.w, value_clip.y + value_clip.h);
        it.printf(value_clip.x, value_clip.y, id(font_huge), "%s", value_m.c_str());
        it.end_clipping();

        it.line(box.x + 12, divider_y, box.x + box.w - 12, divider_y);
        if (show_alerts && item.alerts > 0) {
          it.printf(
            box.x + 12,
            divider_y + 7,
            id(font_sm),
            "%s",
            fit_text_width(id(font_sm), money_text, box.w - 104).c_str()
          );
          it.printf(box.x + box.w - 12, divider_y + 7, id(font_sm), TextAlign::TOP_RIGHT, "告警 %d", item.alerts);
          return;
        }

        it.printf(box.x + 12, divider_y + 7, id(font_sm), "%s", fit_text_width(id(font_sm), money_text, box.w - 24).c_str());
      };

      auto status_severity = [&](const RowData &row) -> int {
        bool has_five = row.five_percent >= 0;
        bool has_week = row.week_percent >= 0;
        if (!has_five && !has_week) {
          return 0;
        }
        if (has_week && row.week_percent == 0) {
          return 5;
        }
        if ((has_five && row.five_percent <= 20) || (has_week && row.week_percent <= 10)) {
          return 4;
        }
        if ((has_five && row.five_percent <= 50) || (has_week && row.week_percent <= 50) || row.status.find("关注") != std::string::npos) {
          return 3;
        }
        return 1;
      };

      auto row_floor = [&](const RowData &row) -> int {
        if (row.five_percent >= 0 && row.week_percent >= 0) {
          return row.five_percent < row.week_percent ? row.five_percent : row.week_percent;
        }
        if (row.five_percent >= 0) {
          return row.five_percent;
        }
        if (row.week_percent >= 0) {
          return row.week_percent;
        }
        return 101;
      };

      auto load_row = [&](JsonObject src, RowData &dst) {
        const char *account = src["account"] | "--";
        const char *status = src["status"] | "--";
        JsonObject five = src["five_hour"];
        JsonObject week = src["week"];

        dst.account = account != nullptr ? account : "--";
        dst.status = status != nullptr ? status : "--";
        dst.five_percent = five["percent"] | -1;
        dst.week_percent = week["percent"] | -1;
      };

      auto pick_focus_row = [&](RowData rows[2], int count) -> RowData {
        RowData selected = {"--", -1, -1, "--"};
        if (count <= 0) {
          return selected;
        }

        selected = rows[0];
        for (int idx = 1; idx < count; idx++) {
          int current_severity = status_severity(rows[idx]);
          int selected_severity = status_severity(selected);
          if (current_severity > selected_severity) {
            selected = rows[idx];
            continue;
          }
          if (current_severity == selected_severity && row_floor(rows[idx]) < row_floor(selected)) {
            selected = rows[idx];
          }
        }
        return selected;
      };

      auto draw_quota_card = [&](const Rect &box, const std::string &title, const std::string &reset_text, const RowData &row, bool show_reset) {
        int metric_top = box.y + (show_reset ? 52 : 39);
        int track_y = box.y + (show_reset ? 78 : 63);
        int divider_top = box.y + (show_reset ? 53 : 38);
        int divider_bottom = box.y + (show_reset ? 94 : 79);
        Rect five_track{box.x + 12, track_y, 190, 9};
        Rect week_track{box.x + 252, track_y, 230, 9};

        draw_outline_round_rect(box, 0);
        it.printf(box.x + 12, box.y + 10, id(font_title), "%s", fit_text_width(id(font_title), title, box.w - 24).c_str());
        if (show_reset) {
          it.printf(box.x + 12, box.y + 32, id(font_xs), "%s", fit_text_width(id(font_xs), reset_text, box.w - 24).c_str());
        }

        it.printf(box.x + 12, metric_top, id(font_metric), "5H");
        it.printf(box.x + 197, metric_top, id(font_metric), TextAlign::TOP_RIGHT, "%s", format_percent(row.five_percent).c_str());
        draw_progress(five_track, row.five_percent, true);

        it.line(box.x + 227, divider_top, box.x + 227, divider_bottom);

        it.printf(box.x + 252, metric_top, id(font_metric), "Week");
        it.printf(box.x + 478, metric_top, id(font_metric), TextAlign::TOP_RIGHT, "%s", format_percent(row.week_percent).c_str());
        draw_progress(week_track, row.week_percent, true);
      };

      auto split_alert = [&](const std::string &alert, std::string &line_one, std::string &line_two) {
        line_one = trim_text(alert, 18);
        line_two.clear();

        size_t cut = alert.find("：");
        size_t skip = std::string("：").size();
        if (cut == std::string::npos) {
          cut = alert.find(':');
          skip = 1;
        }
        if (cut == std::string::npos) {
          return;
        }

        line_one = trim_text(alert.substr(0, cut), 16);
        line_two = alert.substr(cut + skip);
        while (!line_two.empty() && line_two[0] == ' ') {
          line_two.erase(0, 1);
        }
        line_two = trim_text(line_two, 18);
      };

      auto draw_refresh_icon = [&](int cx, int cy) {
        it.circle(cx, cy, 5);
      };

      auto draw_system_panel = [&](const Rect &box, int current_alert_count, const std::string &alert_title, const std::string &alert_detail, int current_refresh_seconds) {
        std::string refresh_text = current_refresh_seconds > 0 ? "刷新周期 " + std::to_string(current_refresh_seconds) + "s" : "刷新周期 --";

        draw_outline_round_rect(box, 0);
        it.printf(box.x + 16, box.y + 10, id(font_title), "告警");

        if (current_alert_count == 0) {
          it.printf(box.x + 16, box.y + 56, id(font_md), "暂无告警");
        } else {
          it.printf(box.x + 16, box.y + 56, id(font_md), "%s", fit_text_width(id(font_md), "1. " + alert_title, box.w - 32).c_str());
          if (!alert_detail.empty()) {
            it.printf(box.x + 16, box.y + 79, id(font_md), "%s", fit_text_width(id(font_md), alert_detail, box.w - 32).c_str());
          }
        }

        it.line(box.x + 16, box.y + 213, box.x + box.w - 16, box.y + 213);
        draw_refresh_icon(box.x + 25, box.y + 231);
        it.printf(box.x + 40, box.y + 225, id(font_xs), "%s", fit_text_width(id(font_xs), refresh_text, box.w - 56).c_str());
      };

      bool parsed = false;
      if (!id(last_payload_body).empty()) {
        parsed = json::parse_json(id(last_payload_body), [&](JsonObject root) -> bool {
          const char *updated = root["updated_at"] | "--";
          updated_at = updated != nullptr ? updated : "--";
          refresh_seconds = root["refresh_seconds"] | 0;

          JsonObject claude_obj = root["claude"];
          const char *claude_value = claude_obj["value"] | "--";
          const char *claude_cost = claude_obj["cost"] | "--";
          claude.value = claude_value != nullptr ? claude_value : "--";
          claude.cost = claude_cost != nullptr ? claude_cost : "--";
          claude.requests = claude_obj["requests"] | 0;
          claude.enabled = claude_obj["enabled"] | -1;
          claude.value_numeric = claude_obj["value_numeric"] | 0;

          JsonObject sub2api_obj = root["sub2api"];
          const char *sub_value = sub2api_obj["value"] | "--";
          const char *sub_cost = sub2api_obj["cost"] | "--";
          sub2api.value = sub_value != nullptr ? sub_value : "--";
          sub2api.cost = sub_cost != nullptr ? sub_cost : "--";
          sub2api.requests = sub2api_obj["requests"] | 0;
          sub2api.enabled = sub2api_obj["enabled"] | -1;
          sub2api.value_numeric = sub2api_obj["value_numeric"] | 0;

          JsonObject total_obj = root["total"];
          const char *total_value = total_obj["value"] | "--";
          const char *total_cost = total_obj["cost"] | "--";
          total.value = total_value != nullptr ? total_value : "--";
          total.cost = total_cost != nullptr ? total_cost : "--";
          total.requests = total_obj["requests"] | 0;
          total.alerts = total_obj["alerts"] | 0;
          total.enabled = -1;
          total.value_numeric = total_obj["value_numeric"] | 0;

          JsonArray claude_array = root["claude_rows"].as<JsonArray>();
          if (!claude_array.isNull()) {
            for (JsonVariant row_var : claude_array) {
              if (claude_row_count >= 2) {
                break;
              }
              load_row(row_var.as<JsonObject>(), claude_rows[claude_row_count]);
              claude_row_count++;
            }
          }

          JsonArray sub2api_array = root["sub2api_rows"].as<JsonArray>();
          if (!sub2api_array.isNull()) {
            for (JsonVariant row_var : sub2api_array) {
              if (sub2api_row_count >= 2) {
                break;
              }
              load_row(row_var.as<JsonObject>(), sub2api_rows[sub2api_row_count]);
              sub2api_row_count++;
            }
          }

          JsonArray alerts_array = root["alerts"].as<JsonArray>();
          if (!alerts_array.isNull()) {
            for (JsonVariant item : alerts_array) {
              if (alert_count >= 3) {
                break;
              }
              const char *text = item.as<const char *>();
              alert_lines[alert_count] = text != nullptr ? text : "--";
              alert_count++;
            }
          }

          JsonObject reset_obj = root["reset_hints"];
          const char *reset_claude_text = reset_obj["claude_five_hour"] | "--";
          const char *reset_sub2api_text = reset_obj["sub2api_five_hour"] | "--";
          reset_claude = reset_claude_text != nullptr ? reset_claude_text : "--";
          reset_sub2api = reset_sub2api_text != nullptr ? reset_sub2api_text : "--";
          return true;
        });
      }

      std::string status_text = "首次拉取";
      if (!id(last_error_text).empty()) {
        status_text = id(last_error_text);
      } else if (parsed) {
        status_text = "正常";
      }

      // Overview cards use the live metric globals so routine partial refreshes
      // only need to update the changing business numbers.
      claude.value = id(claude_value_live);
      claude.cost = id(claude_cost_live);
      claude.requests = id(claude_requests_live);
      claude.enabled = id(claude_enabled_live);

      sub2api.value = id(sub2api_value_live);
      sub2api.cost = id(sub2api_cost_live);
      sub2api.requests = id(sub2api_requests_live);
      sub2api.enabled = id(sub2api_enabled_live);

      total.value = id(total_value_live);
      total.cost = id(total_cost_live);
      total.requests = id(total_requests_live);
      total.alerts = id(total_alerts_live);

      RowData claude_focus = pick_focus_row(claude_rows, claude_row_count);
      RowData sub2api_focus = pick_focus_row(sub2api_rows, sub2api_row_count);
      std::string alert_title = "暂无告警";
      std::string alert_detail;
      if (alert_count > 0) {
        split_alert(alert_lines[0], alert_title, alert_detail);
      }

      Rect frame{9, 9, 782, 462};
      Rect header{18, 17, 764, 36};
      Rect overview_claude{18, 58, 248, 130};
      Rect overview_sub2api{276, 58, 248, 130};
      Rect overview_total{534, 58, 248, 130};
      Rect quota_claude{18, 193, 506, 135};
      Rect quota_sub2api{18, 333, 506, 138};
      Rect system_panel{534, 193, 248, 278};
      Rect failure_panel{18, 58, 764, 413};

      std::string header_status = "状态 " + trim_text(status_text, 10);
      int header_badge_w = badge_width(id(font_badge), header_status, 90, 176, 12);
      Rect header_badge{right_of(header) - 10 - header_badge_w, 21, header_badge_w, 24};

      draw_outline_round_rect(frame, 5);
      draw_outline_round_rect(header, 4);
      it.printf(header.x + 10, header.y + 5, id(font_header), "InfoHub");
      it.printf(header.x + header.w / 2, header.y + 7, id(font_time), TextAlign::TOP_CENTER, "%s", fit_text_width(id(font_time), updated_at, 260).c_str());
      draw_badge(header_badge, header_status, true);

      if (!parsed) {
        draw_outline_round_rect(failure_panel, 0);
        if (id(last_payload_body).empty()) {
          it.printf(failure_panel.x + 20, failure_panel.y + 20, id(font_title), "等待首次拉取");
          it.printf(failure_panel.x + 20, failure_panel.y + 48, id(font_md), "Waiting for device.json");
        } else {
          it.printf(failure_panel.x + 20, failure_panel.y + 20, id(font_title), "数据解析失败");
          it.printf(failure_panel.x + 20, failure_panel.y + 48, id(font_md), "Check device.json payload");
        }
        it.printf(failure_panel.x + 20, failure_panel.y + 88, id(font_sm), "Error: %s", id(last_error_text).empty() ? "--" : trim_text(id(last_error_text), 28).c_str());
        it.printf(failure_panel.x + 20, failure_panel.y + 108, id(font_sm), "Sync: Force Sync / GPIO3");
        return;
      }

      draw_overview_card(overview_claude, "Claude", claude, false);
      draw_overview_card(overview_sub2api, "Codex", sub2api, false);
      draw_overview_card(overview_total, "合计", total, true);

      draw_quota_card(quota_claude, "Claude 配额", reset_claude, claude_focus, false);
      draw_quota_card(quota_sub2api, "Codex 配额", reset_sub2api, sub2api_focus, true);
      draw_system_panel(system_panel, alert_count, alert_title, alert_detail, refresh_seconds);
