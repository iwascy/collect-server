  <rect class="badge-outline" x="434" y="195" width="76" height="19" rx="9.5"/>
  <text class="badge-text-dark" x="458" y="208">正常</text>
  <text class="quota-metric" x="30" y="240">5H</text>
  <text class="quota-metric" x="215" y="240" text-anchor="end">--</text>
  <rect class="progress-track" x="30" y="248" width="190" height="9" rx="4.5"/>
  <rect class="progress-bar" x="31" y="249" width="188" height="7" rx="3.5"/>
  <line class="divider" x1="245" y1="224" x2="245" y2="264"/>
  <text class="quota-metric" x="270" y="240">Week</text>
  <text class="quota-metric" x="496" y="240" text-anchor="end">--</text>
  <rect class="progress-track" x="270" y="248" width="230" height="9" rx="4.5"/>
  <rect class="progress-bar" x="271" y="249" width="228" height="7" rx="3.5"/>

  <rect class="card" x="18" y="332" width="506" height="138"/>
