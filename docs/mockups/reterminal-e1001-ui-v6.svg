<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <style>
      .bg { fill: #f0ede6; }
      .frame { fill: #f5f3ec; stroke: #222; stroke-width: 1.5; }
      .card { fill: none; stroke: #222; stroke-width: 1; }
      .divider { stroke: #222; stroke-width: 0.75; opacity: 0.5; }
      .header-title { font: 700 23px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; }
      .header-time { font: 500 15px "Noto Sans SC", "PingFang SC", sans-serif; fill: #444; }
      .card-label { font: 500 16px "Noto Sans SC", "PingFang SC", sans-serif; fill: #666; }
      .card-num { font: 700 50px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; letter-spacing: -1px; }
      .card-cost { font: 500 13px "Noto Sans SC", "PingFang SC", sans-serif; fill: #555; }
      .card-alert { font: 600 13px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; }
      .quota-title { font: 700 16px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; }
      .quota-sub { font: 500 12px "Noto Sans SC", "PingFang SC", sans-serif; fill: #666; }
      .quota-metric { font: 700 17px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; }
      .system-title { font: 700 16px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; }
      .system-text { font: 600 14px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; }
      .system-detail { font: 500 12px "Noto Sans SC", "PingFang SC", sans-serif; fill: #555; }
      .badge-filled { fill: #111; }
      .badge-outline { fill: none; stroke: #222; stroke-width: 1; }
      .badge-text-light { font: 700 12px "Noto Sans SC", "PingFang SC", sans-serif; fill: #f5f3ec; }
      .badge-text-dark { font: 700 12px "Noto Sans SC", "PingFang SC", sans-serif; fill: #111; }
      .progress-track { fill: none; stroke: #bbb; stroke-width: 1; }
      .progress-bar { fill: #333; }
    </style>
  </defs>

  <rect class="bg" width="800" height="480"/>
  <rect class="frame" x="9" y="9" width="782" height="462" rx="5"/>

  <rect class="card" x="18" y="17" width="764" height="34" rx="4"/>
