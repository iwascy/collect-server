  <text class="quota-sub" x="30" y="370">5H 重置: 2026-04-23 15:07</text>
  <rect class="badge-filled" x="434" y="338" width="76" height="19" rx="9.5"/>
  <text class="badge-text-light" x="456" y="351">告急</text>
  <text class="quota-metric" x="30" y="398">5H</text>
  <text class="quota-metric" x="215" y="398" text-anchor="end">5%</text>
  <rect class="progress-track" x="30" y="406" width="190" height="9" rx="4.5"/>
  <rect class="progress-bar" x="31" y="407" width="9.5" height="7" rx="3.5"/>
  <line class="divider" x1="245" y1="382" x2="245" y2="422"/>
  <text class="quota-metric" x="270" y="398">Week</text>
  <text class="quota-metric" x="496" y="398" text-anchor="end">37%</text>
  <rect class="progress-track" x="270" y="406" width="230" height="9" rx="4.5"/>
  <rect class="progress-bar" x="271" y="407" width="85" height="7" rx="3.5"/>

  <rect class="card" x="534" y="189" width="248" height="281"/>
  <text class="system-title" x="550" y="208">告警</text>
  <rect class="badge-filled" x="550" y="218" width="66" height="18" rx="9"/>
