  <text class="card-num" x="30" y="139">2.9M</text>
  <line class="divider" x1="30" y1="149" x2="254" y2="149"/>
  <text class="card-cost" x="30" y="164">$0.00</text>

  <rect class="card" x="276" y="58" width="248" height="124"/>
  <text class="card-label" x="288" y="77">Codex</text>
  <text class="card-num" x="288" y="139">33.6M</text>
  <line class="divider" x1="288" y1="149" x2="512" y2="149"/>
  <text class="card-cost" x="288" y="164">$13.66</text>

  <rect class="card" x="534" y="58" width="248" height="124"/>
