  <text class="quota-sub" x="30" y="370">5H 重置: 2026-04-23 15:07</text>
  <rect class="badge-filled" x="430" y="340" width="82" height="20" rx="10"/>
  <text class="badge-text-light" x="456" y="354">告急</text>
  <text class="quota-metric" x="30" y="400">5H</text>
  <text class="quota-metric" x="215" y="400" text-anchor="end">5%</text>
  <rect class="progress-track" x="30" y="411" width="190" height="9" rx="4.5"/>
  <rect class="progress-bar" x="31" y="412" width="9.5" height="7" rx="3.5"/>
  <line class="divider" x1="245" y1="386" x2="245" y2="427"/>
  <text class="quota-metric" x="270" y="400">Week</text>
  <text class="quota-metric" x="496" y="400" text-anchor="end">37%</text>
  <rect class="progress-track" x="270" y="411" width="230" height="9" rx="4.5"/>
  <rect class="progress-bar" x="271" y="412" width="85" height="7" rx="3.5"/>

  <rect class="card" x="534" y="193" width="248" height="278"/>
  <text class="system-title" x="550" y="214">告警</text>
  <text class="system-text" x="550" y="250">1. admin10010</text>
