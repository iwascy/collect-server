  <rect class="badge-outline" x="432" y="200" width="80" height="20" rx="10"/>
  <text class="badge-text-dark" x="457" y="214">正常</text>
  <text class="quota-metric" x="30" y="247">5H</text>
  <text class="quota-metric" x="215" y="247" text-anchor="end">--</text>
  <rect class="progress-track" x="30" y="256" width="190" height="9" rx="4.5"/>
  <rect class="progress-bar" x="31" y="257" width="188" height="7" rx="3.5"/>
