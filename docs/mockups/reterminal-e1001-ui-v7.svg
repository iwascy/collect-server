  <line class="divider" x1="30" y1="154" x2="254" y2="154"/>
  <text class="card-cost" x="30" y="169">$0.00</text>

  <rect class="card" x="276" y="58" width="248" height="130"/>
  <text class="card-label" x="288" y="80">Codex</text>
  <text class="card-num" x="288" y="145">33.6M</text>
  <line class="divider" x1="288" y1="154" x2="512" y2="154"/>
  <text class="card-cost" x="288" y="169">$13.66</text>

